server {
    listen 80;
    server_name localhost;

    # Максимальный размер загружаемых файлов (для картинок блюд)
    client_max_body_size 20M;

    # Корень — собранный Svelte SPA
    root /usr/share/nginx/html;
    index index.html;

    # Gzip-сжатие для быстрой загрузки
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml text/javascript image/svg+xml;
    gzip_min_length 256;

    # Кеширование статических ресурсов (js, css, шрифты, картинки)
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    # Проксирование API на Go-бэкенд
    location /api/ {
        proxy_pass http://backend:8080;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 60s;
        proxy_connect_timeout 10s;
    }

    # Проксирование загруженных файлов (фото блюд)
    location ^~ /uploads/ {
        proxy_pass http://backend:8080;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_read_timeout 60s;
    }

    # SPA fallback — все не найденные пути отдают index.html
    location / {
        try_files $uri $uri/ /index.html;
    }
}
