services:
  db:
    image: postgres:15-alpine
    container_name: baikal_buuzy_db
    restart: always
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-secretpassword}
      POSTGRES_DB: ${POSTGRES_DB:-baikal_buuzy}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "pg_isready -U ${POSTGRES_USER:-postgres} -d ${POSTGRES_DB:-baikal_buuzy}",
        ]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - app-network

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: baikal_buuzy_backend
    restart: always
    environment:
      PORT: ${PORT:-8080}
      DATABASE_URL: ${DATABASE_URL:-postgres://postgres:secretpassword@db:5432/baikal_buuzy?sslmode=disable}
      JWT_SECRET: ${JWT_SECRET:-supersecretjwtkeyforbaikalbuuzycafe2026}
    volumes:
      - ./backend/uploads:/app/uploads
    depends_on:
      db:
        condition: service_healthy
    networks:
      - app-network

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: baikal_buuzy_frontend
    restart: always
    ports:
      - "127.0.0.1:8000:80"
    volumes:
      - ./frontend/public/images:/usr/share/nginx/html/images
    depends_on:
      - backend
    networks:
      - app-network

volumes:
  pgdata:
  uploads_data:

networks:
  app-network:
    driver: bridge
